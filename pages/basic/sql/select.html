<h1>SELECT文・FROM文</h1>

<p>
テーブルからデータを取得するための基本構文です。
SELECTで取得するデータを指定する。
FROMで「どのテーブルから取得するか」を指定する。
</p>

<h2>📌 構文</h2>

<pre>
SELECT name, age
FROM users;
</pre>

<h2>💡 解説</h2>
<p>
usersテーブルから「name」と「age」を取得します。
</p>

<hr>

<h2>📝 問題</h2>
<p>
usersテーブルから「name」だけを取得するSQLを書いてみましょう。
</p>

<details>
  <summary>答えを見る</summary>
  <pre>
SELECT name
FROM users;
  </pre>
</details>
